spring:
  application:
    name: authentication-service

  datasource:
    url: jdbc:postgresql://localhost:5432/collab_auth_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ─── Email (SMTP) ───────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-mailtrap-username}
    password: ${MAIL_PASSWORD:your-mailtrap-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # ─── Thymeleaf ──────────────────────────────────────────────────────────────
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

server:
  port: 8080

# ─── App-level settings ─────────────────────────────────────────────────────
app:
  base-url: http://localhost:8080

  jwt:
    # Minimum 32 chars (256 bits) required for HMAC-SHA256
    secret: ${JWT_SECRET:changeme-collabcode-jwt-secret-key-do-not-use-in-production-01}
    # Access token: 15 minutes (milliseconds)
    expiration: 900000
    # Refresh token: 7 days (milliseconds)
    refresh-expiration: 604800000

  mail:
    from: ${MAIL_FROM:noreply@collabcode.io}
    from-name: CollabCode

# ─── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    # Suppress advisory warning about AuthenticationProvider + UserDetailsService co-existing.
    # This is intentional: we register a custom DaoAuthenticationProvider bean.
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR